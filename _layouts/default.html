  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Wenqi Xian</title>
  <meta name="description" content="{{ site.description }}">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Academicons -->

  {% seo %}
  {% feed_meta %}
</head>
<body>
  <main class="page-content">
    <div class="wrapper">
      {% include header.html %}
      {{ content }}
    </div>
  </main>
  
  {% include footer.html %}
  
  <script>
    // Profile image hover effect for hobbies
    document.addEventListener('DOMContentLoaded', function() {
      const profileImg = document.getElementById('profile-img');
      if (!profileImg) return;
      
      const defaultSrc = profileImg.getAttribute('data-default');
      const hobbyWords = document.querySelectorAll('.hobby-word');
      
      // Preload all hobby images on page load
      hobbyWords.forEach(function(word) {
        const imgSrc = word.getAttribute('data-img');
        if (imgSrc) {
          const preloadImg = new Image();
          preloadImg.src = imgSrc;
        }
      });
      
      hobbyWords.forEach(function(word) {
        word.addEventListener('mouseenter', function() {
          const newImg = this.getAttribute('data-img');
          if (newImg) {
            profileImg.style.opacity = '0';
            setTimeout(function() {
              profileImg.src = newImg;
              profileImg.style.opacity = '1';
            }, 150);
          }
        });
        
        word.addEventListener('mouseleave', function() {
          profileImg.style.opacity = '0';
          setTimeout(function() {
            profileImg.src = defaultSrc;
            profileImg.style.opacity = '1';
          }, 150);
        });
      });
    });
  </script>
</body>
</html>
